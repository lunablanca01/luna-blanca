<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cuenta pendiente</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fff4ec;
      font-family: 'Comic Sans MS', cursive, sans-serif;
    }

    .card {
      background: #ffffff;
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      text-align: center;
      max-width: 400px;
    }

    .card h2 {
      color: #ff8b8b;
      margin-bottom: 15px;
      font-size: 22px;
    }

    .card p {
      color: #333;
      font-size: 16px;
      line-height: 1.5;
    }

    .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }
  </style>

</head>

<body>

  <div class="card">
    <div class="icon">⏳</div>
    <h2>Usuario pendiente de validación</h2>
    <p>
      Tu cuenta aún no ha sido aprobada.<br>
      Por favor comunícate con el administrador.
    </p>
  </div>

</body>
</html>
