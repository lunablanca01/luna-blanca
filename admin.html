<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>

  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/admin.css">
</head>

<body>

<main class="contenido">

  <h1>Panel Admin</h1>

  <div class="admin-container">

    <!-- 🔹 SIDEBAR -->
    <div class="sidebar">

      <button onclick="mostrarPanel('pendientes')">🟢 Aprobar usuarios</button>
      <button onclick="mostrarPanel('roles')">🔵 Cambiar roles</button>
      <button id="btn-logout">🚪 Cerrar sesión</button>

    </div>

    <!-- 🔹 CONTENIDO -->
    <div class="contenido-admin">

      <!-- 🟢 PANEL 1: PENDIENTES -->
      <div id="panel-pendientes" class="panel activa">

        <h2>Usuarios pendientes</h2>
        <div id="pendientes"></div>

      </div>

      <!-- 🔵 PANEL 2: ROLES -->
      <div id="panel-roles" class="panel">

        <h2>Cambiar roles</h2>

        <input type="text" id="emailRol" placeholder="Correo del usuario">
        <button onclick="cambiarRol()">Confirmar</button>

        <h3>Admins actuales</h3>
        <div id="admins"></div>

      </div>

    </div>

  </div>

</main>

<script type="module" src="js/admin.js"></script>

</body>
</html>
