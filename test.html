<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test Supabase</title>
</head>

<body>

<h2>Prueba Supabase2</h2>

<input type="email" id="email" placeholder="Correo">
<input type="password" id="password" placeholder="Contraseña">

<br><br>

<button onclick="registrar()">Registrarse</button>
<button onclick="login()">Login</button>

<p id="mensaje"></p>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://qaophiaogsvhkgmbfcuf.supabase.co",
  "sb_publishable_CAkCS2tdVxztSVlOt7tVNg_x2zuUTDN"
);

// 👇 HACERLAS GLOBALES
window.registrar = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  console.log("REGISTRO:", data, error);

  document.getElementById("mensaje").innerText =
    error ? error.message : "Usuario creado 🎉";
};

window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  console.log("LOGIN:", data, error);

  document.getElementById("mensaje").innerText =
    error ? error.message : "Login correcto 🔓";
};
</script>

</body>
</html>
