<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Blanca</title>

<!-- Evitar cache -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Molengo&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/luna-blanca.css">
</head>

<body>

<div class="contenido">

<h1><a href="luna-blanca.html">Luna Blanca</a></h1>

<!-- 🔥 ESTE ES EL CONTENEDOR QUE FALTABA -->
<div class="layout-principal">

  <!-- 🟣 IZQUIERDA -->
  <div class="controles">

    <!-- BUSCADOR -->
    <div class="barra-busqueda">
      <input type="text" id="buscador" placeholder="Buscar danmei...">
      <button class="btn-suave" onclick="buscarTexto()">Buscar</button>
    </div>

    <!-- FILTROS -->
    <button class="btn-suave btn-filtros-movil" onclick="togglePanelFiltros()">
      Filtros ▼
    </button>

    <div class="panel-filtros">
      <div class="fila-filtros">

        <div class="dropdown">
          <button class="dropdownBtn" onclick="toggleDropdown('tipo',this)">Tipo ▼</button>
          <div class="dropdownContenido" id="dropdown-tipo"></div>
        </div>

        <div class="dropdown">
          <button class="dropdownBtn" onclick="toggleDropdown('estado',this)">Estado ▼</button>
          <div class="dropdownContenido" id="dropdown-estado"></div>
        </div>

        <div class="dropdown">
          <button class="dropdownBtn" onclick="toggleDropdown('ambientado',this)">Ambientado ▼</button>
          <div class="dropdownContenido" id="dropdown-ambientado"></div>
        </div>

        <div class="dropdown">
          <button class="dropdownBtn" onclick="toggleDropdown('inicial',this)">Inicial ▼</button>
          <div class="dropdownContenido" id="dropdown-inicial">
            <label><input type="checkbox" value="a"> A</label>
            <label><input type="checkbox" value="b"> B</label>
            <label><input type="checkbox" value="c"> C</label>
            <label><input type="checkbox" value="d"> D</label>
            <label><input type="checkbox" value="e"> E</label>
            <label><input type="checkbox" value="f"> F</label>
            <label><input type="checkbox" value="g"> G</label>
            <label><input type="checkbox" value="h"> H</label>
            <label><input type="checkbox" value="i"> I</label>
            <label><input type="checkbox" value="j"> J</label>
            <label><input type="checkbox" value="k"> K</label>
            <label><input type="checkbox" value="l"> L</label>
            <label><input type="checkbox" value="m"> M</label>
            <label><input type="checkbox" value="n"> N</label>
            <label><input type="checkbox" value="o"> O</label>
            <label><input type="checkbox" value="p"> P</label>
            <label><input type="checkbox" value="q"> Q</label>
            <label><input type="checkbox" value="r"> R</label>
            <label><input type="checkbox" value="s"> S</label>
            <label><input type="checkbox" value="t"> T</label>
            <label><input type="checkbox" value="u"> U</label>
            <label><input type="checkbox" value="v"> V</label>
            <label><input type="checkbox" value="w"> W</label>
            <label><input type="checkbox" value="x"> X</label>
            <label><input type="checkbox" value="y"> Y</label>
            <label><input type="checkbox" value="z"> Z</label>
          </div>
        </div>

      </div>
    </div>



    <!-- CATEGORÍAS -->
    <button class="btn-suave btn-categorias" onclick="togglePanelCategorias()">
      Categorías ▼
    </button>

    <div class="panel-categorias">
      <div id="dropdown-categoria"></div>
    </div>

    <!-- BOTONES -->
    <div class="botones-filtros">
      <button class="btn-aplicar" onclick="aplicarFiltros()">Aplicar filtros</button>
      <button class="btn-limpiar" onclick="limpiarFiltros()">Limpiar</button>
    </div>

    <!-- 🔹 FILTROS ACTIVOS -->
    <div id="filtros-activos"></div>

    <!-- KO-FI -->
    <div id="kofi-container">
      <a href="https://ko-fi.com/marumaru0101" target="_blank">
        <img src="assets/ko-fi.png" alt="Invítame un café">
      </a>
    </div>

  </div>

  <!-- 🔵 DERECHA -->
  <div class="col-tarjetas">

    <!-- 🔹 HEADER TARJETAS (ORDENAR) -->
    <div class="header-tarjetas">
      <div></div>

      <div class="ordenar">
        <button id="btn-ordenar">Ordenar ▼</button>

        <div class="dropdown-orden" id="dropdown-orden">
          <button data-orden="az">A - Z</button>
          <button data-orden="za">Z - A</button>
          <button data-orden="update">Última actualización</button>
        </div>
      </div>
    </div>

    <!-- 🔹 GRID TARJETAS -->
    <div class="grid" id="contenedor-tarjetas"></div>

    <!-- 🔹 FOOTER TARJETAS -->
    <div class="footer-tarjetas">

      <button id="mostrar-todo">Mostrar todo</button>

      <div id="paginacion"></div>

      <button id="btn-descargar" title="Descargar">
        <img src="assets/icon-descargar.png" class="icon-descargar" alt="Descargar">
      </button>

    </div>

  </div>

</div>
</div>

<div id="banner-container"></div>

<script>
  window.baseRuta = "";
</script>

<script src="js/banner.js"></script>
<script type="module" src="/luna-blanca/js/auth.js"></script>
<script src="js/tags.js"></script>
<script src="js/tarjetas.js"></script>
<script src="js/main.js"></script>
<script src="js/estadoNovela.js"></script>
<script type="module" src="js/estadoLectura.js"></script>

<div id="usuario-container"></div>
<script type="module" src="js/usuario.js"></script>

<a href="#" id="scrollTop" title="Volver arriba">🌸</a>

<div id="modal-descarga" class="modal-overlay">

  <div class="modal-box">

    <!-- X cerrar -->
    <button class="modal-close" id="cerrar-modal">×</button>

    <!-- contenido -->
    <div class="modal-contenido">

      <label class="opcion">
        <input type="checkbox" value="titulo" checked>
        Título en español
      </label>

      <label class="opcion">
        <input type="checkbox" value="ingles" checked>
        Título en inglés
      </label>

      <label class="opcion">
        <input type="checkbox" value="capitulos" checked>
        Capítulos
      </label>

      <label class="opcion">
        <input type="checkbox" value="autor" checked>
        Autor
      </label>

    </div>

    <!-- botón -->
    <button id="confirmar-descarga" class="btn-descargar-modal">
      Descargar
    </button>

  </div>

</div>
  
</body>
</html>
