<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Lecturas</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Molengo&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/mis-lecturas.css">
</head>
<body style="display:none;">

<div class="contenido">

<header class="logo">
  <a href="../luna-blanca.html">Luna Blanca</a>
</header>

<h1>Mis Lecturas</h1>

<div class="layout-principal">

  <!-- 🔹 COLUMNA IZQUIERDA (FILTROS) -->
  <div class="controles">

    <!-- Estado de lectura -->
    <div class="filtro-dropdown">
      <div class="filtro-header">📚 Estado de lectura</div>
      
      <div class="panel-filtros activo">
        <div class="fila-filtros">
          <button class="filtro-btn" data-grupo="estado" data-valor="por_leer">📘 Por leer</button>
          <button class="filtro-btn" data-grupo="estado" data-valor="leyendo">📖 Leyendo</button>
          <button class="filtro-btn" data-grupo="estado" data-valor="leido">✅ Leído</button>
          <button class="filtro-btn" data-grupo="estado" data-valor="leido_mtl">🈶 Leído MTL</button>
        </div>
      </div>
    </div>

    <!-- Estado de novela -->
    <div class="filtro-dropdown">
      <div class="filtro-header">📖 Estado de novela</div>
    
      <div class="panel-filtros activo">
        <div class="fila-filtros">
          <button class="filtro-btn" data-grupo="estadoNovela" data-valor="finalizado">✅ Finalizado</button>
          <button class="filtro-btn" data-grupo="estadoNovela" data-valor="en-proceso">🟡 En proceso</button>
          <button class="filtro-btn" data-grupo="estadoNovela" data-valor="pendiente">⚫ Pendiente</button>
          <button class="filtro-btn" data-grupo="estadoNovela" data-valor="mtl">🈶 MTL</button>
        </div>
      </div>
    </div>

    <div class="acciones-filtros">
      <button id="btn-aplicar">Aplicar filtros</button>
      <button id="btn-limpiar">Limpiar</button>
    </div>

    <!-- KO-FI -->
    <div id="kofi-container">
      <a href="https://ko-fi.com/marumaru0101" target="_blank">
        <img src="../assets/ko-fi.png" alt="Invítame un café">
      </a>
    </div>

  </div>

  <!-- 🔹 COLUMNA DERECHA (TARJETAS) -->
  <div class="col-tarjetas">

    <!-- 🔹 HEADER TARJETAS (ORDENAR) -->
    <div class="header-tarjetas">
      <div></div>

      <div class="ordenar">
        <button id="btn-ordenar">Ordenar ▼</button>

        <div class="dropdown-orden" id="dropdown-orden">
          <button data-orden="az">A - Z</button>
          <button data-orden="za">Z - A</button>
        </div>
      </div>
    </div>
    
    <div class="grid" id="contenedor-mis-lecturas"></div>

    <!-- 🔹 FOOTER TARJETAS -->
    <div class="footer-tarjetas">

      <button id="mostrar-todo-lecturas">Mostrar todo</button>

      <div id="paginacion-lecturas"></div>

      <button id="btn-descargar-lecturas" title="Descargar">
        <img src="../assets/icon-descargar.png" class="icon-descargar" alt="Descargar">
      </button>

    </div>
    
  </div>

</div>

</div>

<div id="banner-container"></div>

<script type="module" src="../js/banner.js"></script>
<script type="module" src="../js/auth.js"></script> 
<script src="../js/tarjetas.js"></script>
<script>
  window.novelasCompartidas = novelas;
</script>
<script src="../js/estadoNovela.js"></script>
<script type="module" src="../js/mis-lecturas.js"></script>

<div id="usuario-container"></div>
<script type="module" src="../js/usuario.js"></script>

<a href="#" id="scrollTop" title="Volver arriba">🌸</a>

</body>
</html>
