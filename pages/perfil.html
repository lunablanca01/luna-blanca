<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil</title>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Molengo&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/perfil.css">
</head>

<body style="display:none;">

<div class="contenido">

  <h1>Mi Perfil</h1>

  <div class="perfil-container">

    <!-- 🔹 PANEL IZQUIERDO -->
    <div class="sidebar">

      <button onclick="mostrarSeccion('perfil')">👤 Perfil</button>
      <button onclick="mostrarSeccion('editar')">⚙️ Cambiar datos</button>
      <button id="btn-logout">🚪 Cerrar sesión</button>

    </div>

    <!-- 🔹 CONTENIDO DERECHO -->
    <div class="contenido-perfil">

      <!-- 👤 SECCIÓN PERFIL -->
      <div id="seccion-perfil" class="seccion activa">

        <img id="avatar" src="../imagenes/default-avatar.png" alt="avatar">

        <h2 id="nombre-usuario">Usuario</h2>
        <p id="email-usuario">correo@email.com</p>

      </div>

      <!-- ⚙️ SECCIÓN EDITAR -->
      <div id="seccion-editar" class="seccion">

        <h3>Cambiar nombre</h3>
        <input type="text" id="nuevo-nombre" placeholder="Nuevo nombre">
        <button onclick="cambiarNombre()">Guardar</button>

        <h3>Cambiar contraseña</h3>
        <input type="password" id="nueva-pass" placeholder="Nueva contraseña">
        <button onclick="cambiarPassword()">Actualizar</button>

      </div>

    </div>

  </div>

</div>

<script src="../js/perfil.js"></script>

</body>
</html>
