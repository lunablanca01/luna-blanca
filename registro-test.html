<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Test Supabase</title>
</head>
<body>
  <h1>Crear Usuario de Prueba</h1>

  <label>Email:</label>
  <input type="email" id="emailRegistro" placeholder="correo@example.com" />
  <br/>

  <label>Contraseña:</label>
  <input type="password" id="passwordRegistro" placeholder="6+ caracteres" />
  <br/>

  <label>Nombre:</label>
  <input type="text" id="nombreRegistro" placeholder="Tu nombre" />
  <br/>

  <button id="btnRegistro">Registrar</button>

  <p id="mensaje"></p>

  <script type="module" src="registro-test.js"></script>
</body>
</html>
