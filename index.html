<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Luna Blanca</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Molengo&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Molengo', sans-serif;
  background: linear-gradient(to bottom, #bfe7ff 0%, #ffffff 25%);
}

.caja {
  background: white;
  padding: 40px;
  border-radius: 14px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  width: 90%;
  max-width: 400px;
}

h1 {
  font-family: 'Pacifico', cursive;
  color: #ff8b8b;
  margin-bottom: 25px;
}

h2 {
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  margin-bottom: 12px;
  background: #f3fbff;
  border: 1px solid #ddd;
}

.input-error {
  border: 2px solid red;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  background: #ff8b8b;
  color: white;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

/* 👁️ INPUT CON OJO */
.input-group {
  position: relative;
}

.input-group input {
  padding-right: 40px;
}

.toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 16px;
  opacity: 0.6;
}

.toggle:hover {
  opacity: 1;
}

.link {
  font-size: 13px;
  color: #666;
  cursor: pointer;
  margin-top: 10px;
}

.link-olvidaste {
  font-size: 13px;
  color: #666;
  cursor: pointer;
  margin-bottom: 8px;
}

.link span {
  color: #ff8b8b;
  cursor: pointer;
}

#mensaje {
  margin-top: 12px;
}
</style>
</head>

<body>

<div class="caja">
  <h1>Luna Blanca</h1>

  <!-- LOGIN -->
  <div id="loginForm">
    <input type="email" id="email" placeholder="Correo electrónico">

    <div class="input-group">
      <input type="password" id="password" placeholder="Contraseña">
      <span class="toggle" onclick="togglePassword('password', this)">🙈</span>
    </div>

    <div class="link-olvidaste" onclick="mostrarRecuperar()">
      ¿Olvidaste tu contraseña?
    </div>

    <button onclick="login()">Iniciar sesión</button>

    <div class="link">
      ¿Todavía no tienes una cuenta? 
      <span onclick="mostrarRegistro()">Regístrate ahora</span>
    </div>
  </div>

  <!-- REGISTRO -->
  <div id="registroForm" style="display:none;">
    <input type="email" id="emailRegistro" placeholder="Correo electrónico">
    <input type="text" id="nombreRegistro" placeholder="Nombre">

    <div class="input-group">
      <input type="password" id="passwordRegistro" placeholder="Contraseña">
      <span class="toggle" onclick="togglePassword('passwordRegistro', this)">🙈</span>
    </div>

    <button onclick="registrar()">Registrarse</button>

    <div class="link">
      ¿Ya tienes cuenta? 
      <span onclick="mostrarLogin()">Inicia sesión</span>
    </div>
  </div>

  <!-- RECUPERAR CONTRASEÑA -->
  <div id="recuperarForm" style="display:none;">

    <div class="link" style="margin-bottom:15px;">
      Ingresa tu correo para recibir el enlace 💌
    </div>

    <input type="email" id="emailRecuperar" placeholder="Correo electrónico">

    <button onclick="recuperarPassword()">
      Restablecer contraseña
    </button>

    <div class="link" onclick="mostrarLogin()">
      ← Volver al inicio
    </div>
  </div>

  <p id="mensaje"></p>
</div>

<script>
function mostrarRegistro() {
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("registroForm").style.display = "block";
  document.getElementById("recuperarForm").style.display = "none";
}

function mostrarLogin() {
  document.getElementById("loginForm").style.display = "block";
  document.getElementById("registroForm").style.display = "none";
  document.getElementById("recuperarForm").style.display = "none";
}

function mostrarRecuperar() {
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("registroForm").style.display = "none";
  document.getElementById("recuperarForm").style.display = "block";
}

/* 👁️ MOSTRAR / OCULTAR CONTRASEÑA */
function togglePassword(id, icon) {
  const input = document.getElementById(id);

  if (input.type === "password") {
    input.type = "text";
    icon.textContent = "👁️";
  } else {
    input.type = "password";
    icon.textContent = "🙈";
  }
}
</script>

<script type="module" src="js/index.js"></script>

</body>
</html>
