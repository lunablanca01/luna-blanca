<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba</title>
</head>

<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Correo">
<input type="password" id="password" placeholder="Contraseña">

<button onclick="window.registrar()">Registrarse</button>
<button onclick="window.login()">Login</button>

<p id="mensaje"></p>

<!-- SOLO ESTE SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 🔥 SOLO UNA VEZ
const supabase = window.supabase.createClient(
  "https://qaophiaogsvhkgmbfcuf.supabase.co",
  "sb_publishable_CAkCS2tdVxztSVlOt7tVNg_x2zuUTDN"
);

// 👇 FORZAMOS GLOBAL
window.registrar = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  console.log("REGISTRO:", data, error);

  document.getElementById("mensaje").innerText =
    error ? error.message : "Usuario creado 🎉";
};

window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  console.log("LOGIN:", data, error);

  document.getElementById("mensaje").innerText =
    error ? error.message : "Login correcto 🔓";
};
</script>

</body>
</html>
