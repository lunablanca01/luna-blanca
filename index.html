<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba Registro Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
</head>
<body>
  <h1>Registro y Login - Supabase</h1>

  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">
  <button id="registerBtn">Registrarse</button>
  <button id="loginBtn">Iniciar sesión</button>

  <p id="mensaje"></p>

  <script>
    const supabaseUrl = 'https://qaophiaogsvhkgmbfcuf.supabase.co';
    const supabaseKey = 'sb_publishable_CAkCS2tdVxztSVlOt7tVNg_x2zuUTDN';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const mensaje = document.getElementById('mensaje');

    // Registro
    document.getElementById('registerBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const { user, error } = await supabase.auth.signUp({ email, password });
      if (error) mensaje.textContent = 'Error: ' + error.message;
      else mensaje.textContent = 'Usuario creado: ' + user.email;
    });

    // Login
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) mensaje.textContent = 'Error: ' + error.message;
      else mensaje.textContent = '¡Bienvenido ' + data.user.email + '!';
    });

    document.getElementById('registerBtn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const { user, error } = await supabase.auth.signUp({ email, password });
  console.log(user, error); // <-- esto muestra lo que realmente pasa
  if (error) mensaje.textContent = 'Error: ' + error.message;
  else mensaje.textContent = 'Usuario creado: ' + user.email;
});
  </script>
</body>
</html>
