<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Página de Inicio - Prueba Firebase</title>
</head>
<body>
  <h1>Bienvenida a tu página de prueba</h1>

  <p>Ingresa tu email y contraseña:</p>
  <input type="email" id="email" placeholder="Correo electrónico"><br><br>
  <input type="password" id="password" placeholder="Contraseña"><br><br>
  <button id="loginBtn">Iniciar sesión</button>

  <p id="mensaje"></p>

  <!-- Conexión con Firebase -->
  <script type="module">
const loginBtn = document.getElementById("loginBtn");
const mensaje = document.getElementById("mensaje");

loginBtn.addEventListener("click", () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    mensaje.textContent = "Por favor ingresa correo y contraseña";
    return;
  }

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      mensaje.textContent = "¡Bienvenido de nuevo, " + userCredential.user.email + "!";
    })
    .catch((error) => {
      mensaje.textContent = "Error al iniciar sesión: " + error.message;
    });
});
  </script>
</body>
</html>
