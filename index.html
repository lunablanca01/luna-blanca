<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Luna Blanca</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Molengo&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Molengo', sans-serif;
  background: linear-gradient(to bottom, #bfe7ff 0%, #ffffff 25%);
}

.caja {
  background: white;
  padding: 40px;
  border-radius: 14px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  width: 90%;
  max-width: 400px;
}

h1 {
  font-family: 'Pacifico', cursive;
  color: #ff8b8b;
  margin-bottom: 25px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  margin-bottom: 12px;
  background: #f3fbff;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  background: #ff8b8b;
  color: white;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

.link {
  font-size: 13px;
  color: #666;
  cursor: pointer;
  margin-top: 8px;
}

.link span {
  color: #ff8b8b;
  cursor: pointer;
}

#mensaje {
  margin-top: 12px;
}
</style>
</head>

<body>

<div class="caja">
  <h1>Luna Blanca</h1>

  <!-- LOGIN -->
  <div id="loginForm">
    <input type="email" id="email" placeholder="Correo electrónico">
    <input type="password" id="password" placeholder="Contraseña">

    <div class="link">¿Olvidaste tu contraseña?</div>

    <button onclick="login()">Iniciar sesión</button>

    <div class="link">
      ¿Todavía no tienes una cuenta? 
      <span onclick="mostrarRegistro()">Regístrate ahora</span>
    </div>
  </div>

  <!-- REGISTRO -->
  <div id="registroForm" style="display:none;">
    <input type="email" id="emailRegistro" placeholder="Correo electrónico">
    <input type="text" id="nombreRegistro" placeholder="Nombre">
    <input type="password" id="passwordRegistro" placeholder="Contraseña">

    <button onclick="registrar()">Registrarse</button>

    <div class="link">
      ¿Ya tienes cuenta? 
      <span onclick="mostrarLogin()">Inicia sesión</span>
    </div>
  </div>

  <p id="mensaje"></p>
</div>

<script>
function mostrarRegistro() {
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("registroForm").style.display = "block";
}

function mostrarLogin() {
  document.getElementById("loginForm").style.display = "block";
  document.getElementById("registroForm").style.display = "none";
}
</script>

<script type="module" src="js/index.js"></script>

</body>
</html>
