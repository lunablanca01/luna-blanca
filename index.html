<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Luna Blanca</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Molengo&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Molengo', sans-serif;
  background: linear-gradient(to bottom, #bfe7ff 0%, #ffffff 25%);
}

.caja {
  background: white;
  padding: 40px;
  border-radius: 14px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  width: 90%;
  max-width: 400px;
}

h1 {
  font-family: 'Pacifico', cursive;
  color: #ff8b8b;
  margin-bottom: 20px;
}

input, button {
  width: 100%;
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 10px;
}

input {
  background: #f3fbff;
  border: 1px solid #ddd;
}

button {
  background: #ff8b8b;
  color: white;
  border: none;
  cursor: pointer;
}

#mensaje {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="caja">
  <h1>Luna Blanca</h1>

  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">

  <button onclick="registrar()">Registrarse</button>
  <button onclick="login()">Entrar</button>

  <p id="mensaje"></p>
</div>

<script type="module" src="js/index.js"></script>

</body>
</html>
