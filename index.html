<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Supabase</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
    #mensaje {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login / Registro</h2>

  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">

  <button onclick="registrar()">Registrarse</button>
  <button onclick="login()">Iniciar sesión</button>
  <button onclick="logout()">Cerrar sesión</button>

  <p id="mensaje"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://qaophiaogsvhkgmbfcuf.supabase.co";
const supabaseKey = "sb_publishable_CAkCS2tdVxztSVlOt7tVNg_x2zuUTDN";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// REGISTRAR
async function registrar() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  mostrarMensaje(error ? error.message : "Registrado correctamente 🎉");
}

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email: email,
    password: password
  });

  mostrarMensaje(error ? error.message : "Sesión iniciada 🔓");
}

// LOGOUT
async function logout() {
  await supabase.auth.signOut();
  mostrarMensaje("Sesión cerrada 🚪");
}

// MOSTRAR MENSAJE
function mostrarMensaje(msg) {
  document.getElementById("mensaje").innerText = msg;
}

// VERIFICAR SESIÓN AL CARGAR
async function verificar() {
  const { data: { user } } = await supabase.auth.getUser();

  if (user) {
    mostrarMensaje("Ya estás logueado: " + user.email);
  }
}

verificar();
</script>

</body>
</html>
